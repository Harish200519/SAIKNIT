<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports & Analytics | SAI KNITS</title>
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <style>
        :root { --gold: #D4AF37; --bright-gold: #FFD700; --dark: #0a0a05; --glow: rgba(212, 175, 55, 0.15); }
        body { margin: 0; background: var(--dark); font-family: 'Outfit', 'Segoe UI', sans-serif; color: white; padding-top: 120px; min-height: 100vh; }
        
        .navbar { width: 100%; display: flex; justify-content: center; gap: 25px; padding: 25px 0; background: rgba(15, 15, 5, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(212, 175, 55, 0.3); position: fixed; top: 0; z-index: 1000; }
        .navbar a { color: #eee; text-decoration: none; padding: 10px 25px; border-radius: 30px; font-weight: 600; text-transform: uppercase; font-size: 13px; }
        .navbar a:hover { background: linear-gradient(135deg, var(--gold), var(--bright-gold)); color: black; box-shadow: 0 0 20px var(--gold); }

        .container { max-width: 1200px; margin: auto; padding: 30px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 50px; }
        .stat-card { 
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.05), rgba(10, 10, 5, 0.4));
            padding: 40px; 
            border-radius: 25px; 
            border: 1px solid rgba(212, 175, 55, 0.1); 
            text-align: center;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover { border-color: var(--gold); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); transform: translateY(-10px); }
        .stat-card h3 { margin: 0; color: #a0a080; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; }
        .stat-card p { margin: 20px 0 0; font-size: 38px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px var(--glow); }

        .report-box { background: rgba(30, 30, 15, 0.3); border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.1); overflow: hidden; backdrop-filter: blur(10px); }
        .box-header { padding: 25px 35px; background: rgba(212, 175, 55, 0.05); border-bottom: 1px solid rgba(212, 175, 55, 0.1); display: flex; justify-content: space-between; align-items: center; }
        .row { display: flex; justify-content: space-between; padding: 25px 35px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); transition: 0.3s; align-items: center; }
        .row:hover { background: rgba(212, 175, 55, 0.03); }
        
        .badge { background: linear-gradient(135deg, var(--gold), var(--bright-gold)); color: black; padding: 5px 15px; border-radius: 12px; font-size: 10px; font-weight: 900; letter-spacing: 1px; }
        .btn-view { background: transparent; border: 2px solid var(--gold); color: var(--gold); padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: 900; transition: 0.3s; font-size: 12px; }
        .btn-view:hover { background: var(--gold); color: black; box-shadow: 0 0 20px var(--glow); }
        
        .empty-msg { padding: 80px; text-align: center; color: #555; font-style: italic; font-size: 18px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="companydetails.html">Customers</a>
        <a href="billing.html">New Bill</a>
        <a href="dashboard.html" style="color:var(--emerald)">Reports</a>
        <a href="history.html">History</a>
    </nav>

    <div class="container">
        <h1 style="color: var(--emerald); letter-spacing: 2px; text-transform: uppercase;">Business Summary</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Production</h3>
                <p id="totalWeight">0.00 Kgs</p>
            </div>
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <p id="totalRev">₹ 0.00</p>
            </div>
            <div class="stat-card">
                <h3>Bills Generated</h3>
                <p id="totalCount">0</p>
            </div>
        </div>

        <div class="report-box">
            <div class="box-header">
                <span style="font-weight:bold; color:var(--emerald); letter-spacing: 1px;">RECENT CLOUD ENTRIES</span>
                <span class="badge" id="cloudStatus">SAI KNITS CLOUD ACTIVE</span>
            </div>
            <div id="displayList">
                <div class="empty-msg">Fetching records...</div>
            </div>
        </div>
    </div>

    <script>
        let currentHistory = [];

        async function loadDashboard() {
            const listContainer = document.getElementById("displayList");
            const cloudStatus = document.getElementById("cloudStatus");
            
            try {
                currentHistory = await window._firebase.getInvoices();
                
                if (currentHistory.length === 0) {
                    listContainer.innerHTML = '<div class="empty-msg">No cloud records found. Start billing to see reports.</div>';
                    return;
                }

                let weight = 0;
                let revenue = 0;

                listContainer.innerHTML = currentHistory.map((inv, index) => {
                    revenue += parseFloat(inv.grandTotal) || 0;
                    
                    let rowWeight = 0;
                    inv.items.forEach(item => {
                        rowWeight += parseFloat(item.qty) || 0;
                    });
                    weight += rowWeight;

                    return `
                        <div class="row">
                            <div>
                                <div style="font-weight:bold; font-size:16px;">${inv.customer}</div>
                                <div style="color:#a0c0b0; font-size:12px;">Inv: ${inv.invNo} | Date: ${inv.date}</div>
                            </div>
                            <div style="text-align:right; display: flex; align-items: center; gap: 30px;">
                                <div>
                                    <div style="color:var(--emerald); font-weight:bold; font-size:18px;">₹ ${parseFloat(inv.grandTotal).toLocaleString()}</div>
                                    <div style="font-size:11px; color:#555;">${rowWeight.toFixed(2)} Kgs</div>
                                </div>
                                <button class="btn-view" onclick="viewInv(${index})">OPEN</button>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById("totalWeight").innerText = weight.toFixed(2) + " Kgs";
                document.getElementById("totalRev").innerText = "₹ " + revenue.toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById("totalCount").innerText = currentHistory.length;
                cloudStatus.innerText = "CLOUD SYNCED: " + currentHistory.length + " RECORDS";

            } catch (err) {
                listContainer.innerHTML = `<div class="empty-msg" style="color:#ff4444">Failed to connect to cloud: ${err.message}</div>`;
                cloudStatus.style.background = "#ff4444";
                cloudStatus.innerText = "CLOUD DISCONNECTED";
            }
        }

        function viewInv(index) {
            sessionStorage.setItem("viewInvoiceData", JSON.stringify(currentHistory[index]));
            window.location.href = "invoice.html";
        }

        loadDashboard();
    </script>
</body>
</html>

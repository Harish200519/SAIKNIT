<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Entry | SAI KNITS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <style>
        :root { --gold: #D4AF37; --bright-gold: #FFD700; --dark: #0a0a05; --glow: rgba(212, 175, 55, 0.2); }
        body { margin: 0; background: var(--dark); font-family: 'Outfit', 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 120px; padding-bottom: 60px; min-height: 100vh; }
        
        .navbar { width: 100%; display: flex; justify-content: center; gap: 25px; padding: 25px 0; background: rgba(15, 15, 5, 0.9); border-bottom: 1px solid rgba(212, 175, 55, 0.3); position: fixed; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .navbar a { color: #eee; text-decoration: none; padding: 10px 25px; border-radius: 30px; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .navbar a:hover { background: linear-gradient(135deg, var(--gold), var(--bright-gold)); color: black; }

        .billing-card { background: rgba(30, 30, 15, 0.4); backdrop-filter: blur(20px); padding: 50px; border-radius: 30px; width: 95%; max-width: 1100px; border: 1px solid rgba(212, 175, 55, 0.1); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        
        label { display: block; font-size: 10px; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        input, textarea { width: 100%; padding: 15px; background: rgba(10, 10, 5, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 15px; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px var(--glow); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { text-align: left; color: var(--gold); font-size: 11px; padding: 15px; border-bottom: 2px solid rgba(212, 175, 55, 0.2); text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .p-input { background: transparent; border: 1px solid rgba(255, 255, 255, 0.05); padding: 12px; color: white; width: 100%; border-radius: 8px; }
        .p-input:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        
        .calc-section { margin-top: 40px; float: right; width: 380px; background: rgba(212, 175, 55, 0.03); padding: 30px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); }
        .calc-row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 16px; color: #a0a0a0; }
        .total-row { color: var(--gold); font-weight: 900; font-size: 26px; border-top: 1px solid rgba(212,175,55,0.2); margin-top: 15px; padding-top: 20px !important; text-shadow: 0 0 10px var(--glow); }

        .btn-add { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 12px 25px; border-radius: 10px; cursor: pointer; margin-top: 20px; transition: 0.3s; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .btn-add:hover { background: var(--gold); color: black; box-shadow: 0 0 20px var(--glow); }
        .btn-save { width: 100%; padding: 25px; background: linear-gradient(135deg, var(--gold), var(--bright-gold)); color: black; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; margin-top: 50px; font-size: 20px; text-transform: uppercase; letter-spacing: 3px; box-shadow: 0 10px 30px var(--glow); transition: 0.4s; }
        .btn-save:hover { transform: translateY(-5px); box-shadow: 0 20px 50px var(--glow); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="companydetails.html">Customer List</a>
        <a href="billing.html" style="color:var(--emerald)">Billing</a>
        <a href="dashboard.html">Reports</a>
        <a href="history.html">History</a>
    </nav>

    <div class="billing-card">
        <h2 style="color:var(--emerald); margin-top:0; letter-spacing:2px;">KNITTING JOB WORK ENTRY</h2>
        
        <div class="grid">
            <div><label>Invoice No</label><input type="text" id="invNo" placeholder="SK-101"></div>
            <div><label>Date</label><input type="date" id="invDate"></div>
            <div><label>DC / Vehicle No</label><input type="text" id="vehicle"></div>
        </div>

        <div style="margin-bottom:25px;">
            <label>Customer Details</label>
            <input type="text" id="customer" placeholder="Customer Name" style="margin-bottom:10px; font-weight:bold; color:var(--emerald);">
            <textarea id="address" rows="2" placeholder="Customer Address & GSTIN"></textarea>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="40%">Fabric Description</th>
                    <th width="20%">Yarn Type/Count</th>
                    <th width="15%">Weight (Kgs)</th>
                    <th width="12%">Rate/Kg</th>
                    <th width="13%">Amount</th>
                </tr>
            </thead>
            <tbody id="itemBody">
                <tr>
                    <td><input type="text" class="p-desc p-input" placeholder="e.g. 100% Cotton S/J"></td>
                    <td><input type="text" class="p-hsn p-input" placeholder="e.g. 30s Combed"></td>
                    <td><input type="number" class="p-qty p-input" oninput="calculate()" placeholder="0.00"></td>
                    <td><input type="number" class="p-rate p-input" oninput="calculate()" placeholder="0.00"></td>
                    <td><input type="text" class="p-amt p-input" readonly value="0.00" style="color:var(--emerald)"></td>
                </tr>
            </tbody>
        </table>
        <button class="btn-add" onclick="addRow()">+ Add Fabric Item</button>

        <div style="overflow: hidden;">
            <div class="calc-section">
                <div class="calc-row"><span>Gross Total</span><span id="gross">0.00</span></div>
                <div class="calc-row"><span>GST (5%)</span><span id="gstTotal">0.00</span></div>
                <div class="calc-row total-row"><span>Grand Total</span><span id="grandTotal">0.00</span></div>
            </div>
        </div>

        <button class="btn-save" id="saveBtn" onclick="saveInvoice()">GENERATE & SAVE TO CLOUD</button>
    </div>

    <script>
        // Auto-fill from selection
        window.onload = () => {
            const client = JSON.parse(sessionStorage.getItem("selectedClient"));
            if(client) {
                document.getElementById("customer").value = client.name;
                document.getElementById("address").value = `GST: ${client.gst}\n${client.addr}`;
            }
            document.getElementById("invDate").valueAsDate = new Date();
        };

        function calculate() {
            let gross = 0;
            document.querySelectorAll("#itemBody tr").forEach(row => {
                const qty = parseFloat(row.querySelector(".p-qty").value) || 0;
                const rate = parseFloat(row.querySelector(".p-rate").value) || 0;
                const amt = qty * rate;
                row.querySelector(".p-amt").value = amt.toFixed(2);
                gross += amt;
            });
            const tax = gross * 0.05;
            document.getElementById("gross").innerText = gross.toFixed(2);
            document.getElementById("gstTotal").innerText = tax.toFixed(2);
            document.getElementById("grandTotal").innerText = (gross + tax).toFixed(2);
        }

        function addRow() {
            const tbody = document.getElementById("itemBody");
            const newRow = tbody.rows[0].cloneNode(true);
            newRow.querySelectorAll('input').forEach(i => i.value = i.readOnly ? "0.00" : "");
            tbody.appendChild(newRow);
        }

        async function saveInvoice() {
            const btn = document.getElementById("saveBtn");
            btn.innerText = "UPLOADING TO SAI KNITS CLOUD...";
            btn.disabled = true;

            let items = [];
            document.querySelectorAll("#itemBody tr").forEach(row => {
                items.push({
                    desc: row.querySelector(".p-desc").value,
                    hsn: row.querySelector(".p-hsn").value,
                    qty: row.querySelector(".p-qty").value,
                    rate: row.querySelector(".p-rate").value,
                    total: row.querySelector(".p-amt").value
                });
            });

            const bill = {
                invNo: document.getElementById("invNo").value,
                date: document.getElementById("invDate").value,
                vehicle: document.getElementById("vehicle").value,
                customer: document.getElementById("customer").value,
                address: document.getElementById("address").value,
                items: items,
                gross: document.getElementById("gross").innerText,
                grandTotal: document.getElementById("grandTotal").innerText
            };

            try {
                await window._firebase.addInvoice(bill);
                sessionStorage.setItem("viewInvoiceData", JSON.stringify(bill));
                window.location.href = "invoice.html";
            } catch (e) {
                alert("Error saving: " + e.message);
                btn.disabled = false;
                btn.innerText = "GENERATE & SAVE TO CLOUD";
            }
        }
    </script>
</body>
</html>

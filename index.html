<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI KNITS | Premium Textile Management</title>
    <style>
        :root { 
            --gold: #D4AF37; 
            --bright-gold: #FFD700;
            --dark-bg: #0a0a05; 
            --glow: rgba(212, 175, 55, 0.3);
            --glass: rgba(20, 20, 10, 0.8);
        }

        body { 
            margin: 0; 
            background: var(--dark-bg); 
            font-family: 'Outfit', 'Segoe UI', sans-serif; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        /* Premium Gold Navigation */
        .navbar { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            padding: 20px 0; 
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3); 
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
            position: fixed; 
            top: 0; 
            z-index: 1000; 
        }

        .navbar a { 
            color: #eee; 
            text-decoration: none; 
            padding: 10px 25px; 
            border-radius: 30px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 13px;
        }

        .navbar a:hover { 
            background: linear-gradient(135deg, var(--gold), var(--bright-gold));
            color: #000; 
            box-shadow: 0 0 30px var(--glow); 
            transform: translateY(-2px);
        }

        /* Animated Gold Background */
        .glow-circle {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            z-index: 0;
            filter: blur(60px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-30%, -30%) scale(1); }
            to { transform: translate(30%, 30%) scale(1.2); }
        }

        .bg-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            font-size: 18vw; 
            font-weight: 900; 
            color: rgba(212, 175, 55, 0.05); 
            text-transform: uppercase;
            user-select: none; 
            z-index: 1; 
            letter-spacing: -5px;
        }

        /* Attractive Main Container */
        .container { 
            position: relative; 
            z-index: 2; 
            background: rgba(30, 30, 15, 0.6);
            backdrop-filter: blur(20px); 
            padding: 80px 60px; 
            border-radius: 40px; 
            text-align: center; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.1); 
            margin-top: 200px; 
            max-width: 550px;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            font-size: 60px; 
            background: linear-gradient(to right, #D4AF37, #FFD700, #F0E68C, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0; 
            filter: drop-shadow(0 0 15px var(--glow));
            letter-spacing: 8px;
            font-weight: 900;
        }

        p { 
            margin-top: 20px; 
            color: #d4cfb0; 
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* Floating Gold Button */
        .main-btn { 
            margin-top: 50px; 
            padding: 20px 60px; 
            background: transparent; 
            border: 2px solid var(--gold); 
            color: var(--gold); 
            border-radius: 60px; 
            cursor: pointer; 
            transition: 0.5s; 
            font-weight: bold; 
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            z-index: 10;
        }

        .main-btn:hover { 
            background: linear-gradient(135deg, var(--gold), var(--bright-gold));
            color: #000; 
            box-shadow: 0 15px 40px var(--glow); 
            transform: translateY(-8px) scale(1.05); 
        }

        .footer {
            position: fixed;
            bottom: 30px;
            font-size: 14px;
            color: rgba(212, 175, 55, 0.5);
            letter-spacing: 3px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="glow-circle" style="top: 10%; left: 10%;"></div>
    <div class="glow-circle" style="bottom: 10%; right: 10%; animation-delay: -5s;"></div>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="companydetails.html">Customer List</a>
        <a href="billing.html">Billing</a>
        <a href="dashboard.html">Reports</a>
        <a href="history.html">History</a>
    </div>

    <div class="bg-text" style="top:25%">SAI</div>
    <div class="bg-text" style="top:50%">KNITS</div>

    <div class="container">
        <h1>SAI KNITS</h1>
        <p>Precision Knitting Unit & Job Work Management</p>
        <button class="main-btn" onclick="location.href='companydetails.html'">Get Started</button>
    </div>

    <div class="footer">POWERED BY SAI KNITS DIGITAL ENGINE</div>

</body>
</html>

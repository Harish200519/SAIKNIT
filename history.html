<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Records | SAI KNITS</title>
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <style>
        :root { --gold: #D4AF37; --bright-gold: #FFD700; --dark: #0a0a05; --glow: rgba(212, 175, 55, 0.2); }
        body { margin: 0; background: var(--dark); font-family: 'Outfit', 'Segoe UI', sans-serif; color: white; padding-top: 120px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .navbar { width: 100%; display: flex; justify-content: center; gap: 20px; padding: 25px 0; background: rgba(15, 15, 5, 0.9); border-bottom: 1px solid rgba(212, 175, 55, 0.3); position: fixed; top: 0; backdrop-filter: blur(15px); }
        .navbar a { color: #eee; text-decoration: none; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .navbar a:hover { color: var(--gold); }
        table { width: 90%; max-width: 1100px; border-collapse: collapse; background: rgba(30, 30, 15, 0.2); border-radius: 20px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.1); }
        th { background: linear-gradient(135deg, var(--gold), var(--bright-gold)); color: black; padding: 18px; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; font-weight: 900; }
        td { padding: 18px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); text-align: center; font-size: 14px; }
        .loading { color: var(--gold); margin: 30px; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="navbar"><a href="index.html">Home</a> <a href="companydetails.html">Customers</a> <a href="billing.html">New Bill</a> <a href="history.html" style="color:var(--emerald)">Records</a></div>
    
    <h2 style="color:var(--emerald); text-transform:uppercase; letter-spacing:2px;">Knitting Job History (Cloud)</h2>
    <div id="loading" class="loading">Loading records from cloud...</div>
    <table>
        <thead>
            <tr><th>Inv No</th><th>Date</th><th>Customer</th><th>Amount</th><th>Action</th></tr>
        </thead>
        <tbody id="histBody"></tbody>
    </table>

    <script>
        let cloudHistory = [];

        async function loadHistory() {
            const body = document.getElementById("histBody");
            const loading = document.getElementById("loading");
            try {
                cloudHistory = await window._firebase.getInvoices();
                loading.style.display = "none";
                
                if (cloudHistory.length === 0) {
                    body.innerHTML = '<tr><td colspan="5">No records found.</td></tr>';
                    return;
                }

                body.innerHTML = cloudHistory.map((b, i) => `
                    <tr>
                        <td>${b.invNo}</td>
                        <td>${b.date}</td>
                        <td>${b.customer}</td>
                        <td style="color:var(--emerald)">₹ ${parseFloat(b.grandTotal).toLocaleString()}</td>
                        <td><button style="background:var(--emerald); border:none; padding:5px 15px; border-radius:4px; font-weight:bold; cursor:pointer;" onclick='view(${i})'>VIEW</button></td>
                    </tr>
                `).join('');
            } catch (err) {
                loading.innerText = "Error: " + err.message;
            }
        }

        function view(index) {
            sessionStorage.setItem("viewInvoiceData", JSON.stringify(cloudHistory[index]));
            window.location.href = "invoice.html";
        }

        loadHistory();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Directory | SAI KNITS</title>
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <style>
        :root { --gold: #D4AF37; --bright-gold: #FFD700; --dark: #0a0a05; --glow: rgba(212, 175, 55, 0.2); }
        body { margin: 0; background: var(--dark); font-family: 'Outfit', 'Segoe UI', sans-serif; color: white; padding-top: 120px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .navbar { width: 100%; display: flex; justify-content: center; gap: 25px; padding: 25px 0; background: rgba(15, 15, 5, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(212, 175, 55, 0.3); position: fixed; top: 0; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .navbar a { color: #eee; text-decoration: none; padding: 10px 25px; border-radius: 30px; transition: 0.3s; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .navbar a:hover { background: linear-gradient(135deg, var(--gold), var(--bright-gold)); color: black; box-shadow: 0 0 20px var(--gold); }

        .header-section { width: 90%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-section h2 { 
            background: linear-gradient(to right, #D4AF37, #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            letter-spacing: 2px;
        }
        
        #searchBar { width: 100%; padding: 18px; background: rgba(30, 30, 15, 0.5); border: 1px solid rgba(212, 175, 55, 0.3); color: white; border-radius: 15px; font-size: 16px; outline: none; transition: 0.3s; }
        #searchBar:focus { border-color: var(--gold); box-shadow: 0 0 20px var(--glow); }

        .btn-add-new { background: linear-gradient(135deg, var(--gold), var(--bright-gold)); color: black; border: none; padding: 15px 35px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.4s; box-shadow: 0 5px 15px var(--glow); letter-spacing: 1px; }
        .btn-add-new:hover { transform: translateY(-5px); box-shadow: 0 15px 30px var(--glow); }

        .customer-grid { width: 90%; max-width: 1100px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding-bottom: 60px; }
        .customer-card { background: rgba(40, 40, 20, 0.3); border: 1px solid rgba(212, 175, 55, 0.1); padding: 30px; border-radius: 20px; cursor: pointer; transition: 0.4s; position: relative; backdrop-filter: blur(10px); }
        .customer-card:hover { border-color: var(--gold); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); transform: translateY(-10px); background: rgba(50, 50, 25, 0.4); }
        .card-actions { display: none; margin-top: 20px; gap: 10px; }
        .customer-card:hover .card-actions { display: flex; }
        .btn-delete { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid #ff4444; padding: 8px 15px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-delete:hover { background: #ff4444; color: white; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a0d; border: 1px solid var(--gold); padding: 50px; border-radius: 30px; width: 450px; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
        .modal-content h2 { color: var(--gold); margin-top: 0; font-size: 28px; letter-spacing: 1px; }
        .modal-content input { width: 100%; padding: 15px; margin: 12px 0; background: #050502; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .modal-content input:focus { border-color: var(--gold); outline: none; }
        .btn-save { background: linear-gradient(135deg, var(--gold), var(--bright-gold)); color: black; border: none; padding: 15px; flex: 1; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 16px; }
        .btn-cancel { background: #222; color: #999; border: none; padding: 15px; flex: 1; border-radius: 10px; cursor: pointer; font-size: 16px; }
        
        .loading { text-align: center; color: var(--gold); font-style: italic; margin-top: 50px; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="companydetails.html" style="color:var(--emerald)">Customer List</a>
        <a href="billing.html">Billing</a>
        <a href="dashboard.html">Reports</a>
        <a href="history.html">History</a>
    </nav>

    <div class="header-section">
        <h2 style="color:var(--emerald); text-transform: uppercase;">Clients</h2>
        <button class="btn-add-new" onclick="openModal()">+ ADD NEW CUSTOMER</button>
    </div>
    
    <div class="search-container" style="width: 90%; max-width: 1000px; margin-bottom: 30px;">
        <input type="text" id="searchBar" placeholder="Search Exporters or Knitting Units..." onkeyup="filterCustomers()">
    </div>

    <div class="customer-grid" id="customerList"></div>
    <div id="loadingMsg" class="loading">CONNECTING TO SAI KNITS CLOUD...</div>

    <div class="modal" id="customerModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Client</h2>
            <input type="text" id="newCustName" placeholder="Company Name">
            <input type="text" id="newCustGst" placeholder="GST Number">
            <input type="text" id="newCustAddr" placeholder="Address / Location">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" id="saveCustBtn" onclick="saveCustomer()">SAVE TO CLOUD</button>
            </div>
        </div>
    </div>

    <script>
        let allCustomers = [];

        async function loadData() {
            try {
                document.getElementById("loadingMsg").style.display = "block";
                allCustomers = await window._firebase.getCustomers();
                renderCustomers(allCustomers);
                document.getElementById("loadingMsg").style.display = "none";
            } catch (err) {
                document.getElementById("loadingMsg").innerText = "Error loading from cloud: " + err.message;
            }
        }

        function renderCustomers(list) {
            const container = document.getElementById("customerList");
            container.innerHTML = "";
            
            if (list.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px; color:#555;">No customers found in cloud registry.</div>';
                return;
            }

            list.forEach(cust => {
                const card = document.createElement("div");
                card.className = "customer-card";
                card.onclick = (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        sessionStorage.setItem("selectedClient", JSON.stringify(cust));
                        window.location.href = "billing.html";
                    }
                };
                card.innerHTML = `
                    <h3 style="color:var(--emerald); margin:0;">${cust.name}</h3>
                    <p style="font-size:12px; color:#a0c0b0; margin:10px 0 5px 0;">GST: ${cust.gst}</p>
                    <p style="font-size:12px; color:#a0c0b0; margin:0;">LOC: ${cust.addr}</p>
                    <div class="card-actions">
                        <button class="btn-delete" onclick="deleteCust('${cust.id}')">Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCustomers() {
            const term = document.getElementById("searchBar").value.toLowerCase();
            renderCustomers(allCustomers.filter(c => c.name.toLowerCase().includes(term) || c.gst.toLowerCase().includes(term)));
        }

        function openModal() { document.getElementById("customerModal").style.display = "flex"; }
        function closeModal() { document.getElementById("customerModal").style.display = "none"; }

        async function saveCustomer() {
            const btn = document.getElementById("saveCustBtn");
            const name = document.getElementById("newCustName").value;
            const gst = document.getElementById("newCustGst").value;
            const addr = document.getElementById("newCustAddr").value;

            if(name && gst) {
                btn.innerText = "UPLOADING...";
                btn.disabled = true;
                const newEntry = { name, gst, addr, createdAt: new Date().toISOString() };
                try {
                    await window._firebase.addCustomer(newEntry);
                    await loadData();
                    closeModal();
                    // Clear fields
                    document.getElementById("newCustName").value = "";
                    document.getElementById("newCustGst").value = "";
                    document.getElementById("newCustAddr").value = "";
                } catch (e) {
                    alert("Error saving: " + e.message);
                } finally {
                    btn.innerText = "SAVE TO CLOUD";
                    btn.disabled = false;
                }
            } else {
                alert("Please enter at least Name and GST");
            }
        }

        async function deleteCust(id) {
            if (confirm("Delete this customer from records?")) {
                try {
                    await window._firebase.deleteCustomer(id);
                    await loadData();
                } catch (e) {
                    alert("Error deleting: " + e.message);
                }
            }
        }

        loadData();
    </script>
</body>
</html>
